<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Habit Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #F7F6F3; --surface: #FFFFFF; --border: #E4E2DB;
    --text-primary: #1A1917; --text-secondary: #7A7870; --text-hint: #B4B2A9;
    --green: #1D9E75; --green-light: #E1F5EE;
    --coral: #D85A30; --coral-light: #FAECE7; --coral-border: #F0997B;
    --radius: 12px; --radius-sm: 8px; --radius-pill: 20px;
  }
  html, body { height: 100%; background: var(--surface); font-family: 'DM Sans', sans-serif; color: var(--text-primary); -webkit-font-smoothing: antialiased; }
  body { min-height: 100vh; padding: 1.25rem; }
  .card { width: 100%; }
  .header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1.75rem; }
  .title { font-size: 24px; font-weight: 500; letter-spacing: -0.02em; color: var(--text-primary); }
  .date-range { font-size: 13px; color: var(--text-secondary); margin-top: 3px; font-family: 'DM Mono', monospace; }
  .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 1.75rem; }
  .stat { background: var(--bg); border-radius: var(--radius-sm); padding: 14px 16px; border: 1px solid var(--border); }
  .stat-label { font-size: 11px; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-secondary); margin-bottom: 5px; }
  .stat-val { font-size: 26px; font-weight: 500; letter-spacing: -0.02em; color: var(--text-primary); font-family: 'DM Mono', monospace; }
  #main-grid { display: grid; gap: 6px; align-items: center; }
  .day-col { font-size: 11px; font-weight: 500; letter-spacing: 0.05em; text-transform: uppercase; color: var(--text-hint); text-align: center; padding-bottom: 4px; }
  .day-col.today { color: var(--green); }
  .habit-name { font-size: 14px; color: var(--text-primary); white-space: nowrap; padding-right: 16px; }
  .dot-wrap { display: flex; align-items: center; justify-content: center; }
  .dot { width: 30px; height: 30px; border-radius: 50%; border: 1.5px solid var(--border); background: var(--surface); cursor: pointer; transition: background 0.12s, border-color 0.12s, transform 0.1s; flex-shrink: 0; }
  .dot:hover { border-color: var(--green); background: var(--green-light); transform: scale(1.08); }
  .dot.done { background: var(--green); border-color: var(--green); }
  .dot.done:hover { background: #0F6E56; border-color: #0F6E56; transform: scale(1.08); }
  .dot.today-ring { border-color: var(--green); border-width: 2px; }
  .dot.future { opacity: 0.25; cursor: default; pointer-events: none; }
  .dot.na { background: #EEEDE9; border-color: #EEEDE9; cursor: default; pointer-events: none; }
  .divider { height: 1px; background: var(--border); margin: 1.25rem 0; }
  .todo-label { font-size: 11px; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-secondary); margin-bottom: 10px; }
  .todo-chips { display: flex; flex-wrap: wrap; gap: 6px; min-height: 28px; }
  .chip { font-size: 13px; padding: 4px 12px; border-radius: var(--radius-pill); background: var(--coral-light); color: var(--coral); border: 1px solid var(--coral-border); }
  .all-done { font-size: 13px; color: var(--green); font-weight: 500; }
  @media (max-width: 600px) { body { padding: 1rem; } .card { padding: 1.25rem; } .habit-name { font-size: 12px; } .dot { width: 24px; height: 24px; } }
</style>
</head>
<body>
<div class="card">
  <div id="main-grid"></div>
</div>

<script>
const DEFAULT_HABITS = [
  { name: 'Push ups',    startDate: '2026-04-21', status: 'active', pausedFrom: null },
  { name: 'Rehab',       startDate: '2026-04-21', status: 'active', pausedFrom: null },
  { name: 'Up and out',  startDate: '2026-04-21', status: 'active', pausedFrom: null },
  { name: 'Touch Typing',startDate: '2026-04-21', status: 'active', pausedFrom: null },
  { name: 'Guitar',      startDate: '2026-04-21', status: 'active', pausedFrom: null },
  { name: 'Read',        startDate: '2026-04-21', status: 'active', pausedFrom: null },
];

function getDateKey(d) { return d.toISOString().slice(0, 10); }

function getLast7Days() {
  const days = [];
  for (let i = 6; i >= 0; i--) { const d = new Date(); d.setDate(d.getDate() - i); days.push(d); }
  return days;
}

function loadHabits() {
  try {
    const h = localStorage.getItem('habits');
    return h ? JSON.parse(h) : DEFAULT_HABITS;
  } catch(e) { return DEFAULT_HABITS; }
}

function loadCompletions() {
  try { const c = localStorage.getItem('completions'); return c ? JSON.parse(c) : {}; }
  catch(e) { return {}; }
}

function save(habits, completions) {
  localStorage.setItem('habits', JSON.stringify(habits));
  localStorage.setItem('completions', JSON.stringify(completions));
}

// Returns 'done', 'na', or 'empty'
function getDotState(completions, habitName, dateKey) {
  const val = completions[habitName + '|' + dateKey];
  if (val === true) return 'done';
  if (val === 'na') return 'na';
  return 'empty';
}

function pauseHabit(habits, habitName, today) {
  return habits.map(h => h.name === habitName ? { ...h, status: 'paused', pausedFrom: today } : h);
}

function unpauseHabit(habits, completions, habitName, today) {
  const habit = habits.find(h => h.name === habitName);
  if (!habit || !habit.pausedFrom) return { habits, completions };
  // Backfill 'na' from pausedFrom to yesterday
  const c = { ...completions };
  let cursor = new Date(habit.pausedFrom);
  const yesterday = new Date(today); yesterday.setDate(yesterday.getDate() - 1);
  while (cursor <= yesterday) {
    const key = getDateKey(cursor);
    if (!c[habitName + '|' + key]) c[habitName + '|' + key] = 'na';
    cursor.setDate(cursor.getDate() + 1);
  }
  const newHabits = habits.map(h => h.name === habitName ? { ...h, status: 'active', pausedFrom: null } : h);
  return { habits: newHabits, completions: c };
}

function render() {
  const habits = loadHabits();
  const completions = loadCompletions();
  const days = getLast7Days();
  const today = getDateKey(new Date());
  const DAY_NAMES = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

  const activeHabits = habits.filter(h => h.status === 'active');

  const cols = 'max-content repeat(7, 1fr)';
  const grid = document.getElementById('main-grid');
  grid.innerHTML = '';
  grid.style.gridTemplateColumns = cols;

  // Re-insert the cog as first cell after clearing grid
  renderSettingsButton();

  // Header row — day labels
  days.forEach(d => {
    const isToday = getDateKey(d) === today;
    const el = document.createElement('div');
    el.className = 'day-col' + (isToday ? ' today' : '');
    el.textContent = DAY_NAMES[d.getDay()];
    grid.appendChild(el);
  });

  // Habit rows
  activeHabits.forEach(habit => {
    const nameEl = document.createElement('div');
    nameEl.className = 'habit-name';
    nameEl.textContent = habit.name;
    nameEl.title = habit.name;
    grid.appendChild(nameEl);

    days.forEach(d => {
      const key = getDateKey(d);
      const isFuture = key > today;
      const isToday = key === today;
      const beforeStart = habit.startDate && key < habit.startDate;
      const state = getDotState(completions, habit.name, key);

      const wrap = document.createElement('div');
      wrap.className = 'dot-wrap';
      const dot = document.createElement('div');

      let cls = 'dot';
      if (beforeStart || state === 'na') {
        cls += ' na';
      } else if (state === 'done') {
        cls += ' done';
      } else if (isFuture) {
        cls += ' future';
      } else if (isToday) {
        cls += ' today-ring';
      }

      dot.className = cls;

      if (!isFuture && !beforeStart && state !== 'na') {
        dot.addEventListener('click', () => {
          const c = loadCompletions();
          const h = loadHabits();
          c[habit.name + '|' + key] = state !== 'done' ? true : false;
          save(h, c);
          render();
        });
      }

      wrap.appendChild(dot);
      grid.appendChild(wrap);
    });
  });
}

function runBackupIfDue() {
  const lastBackup = localStorage.getItem('backup_last_run');
  const today = getDateKey(new Date());
  if (lastBackup === today) return;
  const now = new Date();
  if (now.getDay() === 0) {
    runGistBackup(today, 'weekly');
  } else {
    runGistBackup(today, 'daily');
  }
}

// ── GitHub Gist backup ──────────────────────────────────────────────────────

function getGistToken() { return localStorage.getItem('gist_token') || ''; }
function getGistId(key) { return localStorage.getItem('gist_id_' + key) || ''; }
function setGistId(key, id) { localStorage.setItem('gist_id_' + key, id); }

async function runGistBackup(today, mode) {
  const token = getGistToken();
  if (!token) { showBackupStatus('No GitHub token — open settings', 'warn'); return; }
  const habits = loadHabits();
  const completions = loadCompletions();
  const content = JSON.stringify({ date: today, habits, completions }, null, 2);
  try {
    // Always write the daily file
    await writeGistFile(token, 'daily', 'habit-tracker-daily.json', content);

    // On Sundays also write the rolling weekly slot
    if (mode === 'weekly') {
      const slot = getNextWeeklySlot();
      await writeGistFile(token, 'weekly' + slot, 'habit-tracker-' + slot + '.json', content, 'Habit Tracker — Weekly Backup ' + slot + ' (' + today + ')');
      localStorage.setItem('weekly_slot', String(slot));
    }

    localStorage.setItem('backup_last_run', today);
    showBackupStatus('✓', 'ok');
  } catch(e) {
    showBackupStatus(e.message, 'err');
  }
}

function getNextWeeklySlot() {
  const current = parseInt(localStorage.getItem('weekly_slot') || '0');
  return (current % 4) + 1;
}

async function writeGistFile(token, idKey, filename, content, description) {
  const gistId = getGistId(idKey);
  if (gistId) {
    await patchGist(token, gistId, filename, content, description);
  } else {
    const id = await createGist(token, filename, content, description);
    setGistId(idKey, id);
  }
}

async function createGist(token, filename, content, description) {
  const res = await fetch('https://api.github.com/gists', {
    method: 'POST',
    headers: { Authorization: 'token ' + token, 'Content-Type': 'application/json' },
    body: JSON.stringify({ description: description || 'Habit Tracker Backup', public: false,
      files: { [filename]: { content } } })
  });
  if (!res.ok) throw new Error('HTTP ' + res.status);
  const data = await res.json();
  return data.id;
}

async function patchGist(token, gistId, filename, content, description) {
  const body = { files: { [filename]: { content } } };
  if (description) body.description = description;
  const res = await fetch('https://api.github.com/gists/' + gistId, {
    method: 'PATCH',
    headers: { Authorization: 'token ' + token, 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  if (!res.ok) throw new Error('HTTP ' + res.status);
}

function showBackupStatus(msg, type) {
  let el = document.getElementById('backup-status');
  if (!el) {
    el = document.createElement('div');
    el.id = 'backup-status';
    el.style.cssText = 'position:fixed;top:14px;left:16px;font-size:12px;padding:4px 10px;border-radius:20px;font-family:DM Sans,sans-serif;z-index:999;cursor:pointer;display:none';
    el.addEventListener('click', () => { el.style.display = 'none'; });
    document.body.appendChild(el);
  }
  const colors = { ok: '#1D9E75', warn: '#B45309', err: '#D85A30' };
  el.style.background = colors[type] || '#333';
  el.style.color = '#fff';
  el.style.display = 'block';
  el.textContent = type === 'ok' ? '✓' : '✗ ' + msg;
  if (type === 'ok') setTimeout(() => { el.style.display = 'none'; }, 3000);
}

// ── Settings panel ──────────────────────────────────────────────────────────

function renderSettings() {
  let panel = document.getElementById('settings-panel');
  if (panel) { panel.remove(); return; }
  panel = document.createElement('div');
  panel.id = 'settings-panel';
  panel.style.cssText = 'position:fixed;top:10%;left:50%;transform:translateX(-50%);background:#fff;border:1px solid #E4E2DB;border-radius:12px;padding:24px;width:340px;max-height:80vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,0.12);z-index:1000;font-family:DM Sans,sans-serif';
  const hdr = 'display:flex;justify-content:space-between;align-items:center;cursor:pointer;padding:12px 0;border-bottom:1px solid #E4E2DB;user-select:none;';
  const lbl = 'font-size:11px;font-weight:500;letter-spacing:0.06em;text-transform:uppercase;color:#7A7870';
  const chv = 'font-size:11px;color:#B4B2A9';

  panel.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
      <div style="font-size:15px;font-weight:500">Settings</div>
      <button id="close-settings-btn" style="background:none;border:none;font-size:18px;cursor:pointer;color:#B4B2A9;line-height:1;padding:0">✕</button>
    </div>

    <div id="section-habits">
      <div style="${hdr}" id="toggle-habits">
        <span style="${lbl}">Habits</span>
        <span style="${chv}" id="chevron-habits">▼</span>
      </div>
      <div id="body-habits" style="padding-top:10px">
        <div id="habits-manage-list" style="margin-bottom:10px"></div>
        <div style="display:flex;gap:8px;margin-bottom:12px">
          <input id="new-habit-input" type="text" placeholder="New habit name"
            style="flex:1;padding:8px 10px;border:1px solid #E4E2DB;border-radius:8px;font-size:13px;outline:none" />
          <button id="add-habit-btn" style="padding:8px 14px;background:#1D9E75;color:#fff;border:none;border-radius:8px;font-size:13px;cursor:pointer">Add</button>
        </div>
      </div>
    </div>

    <div id="section-backup">
      <div style="${hdr}" id="toggle-backup">
        <span style="${lbl}">Backup</span>
        <span style="${chv}" id="chevron-backup">▶</span>
      </div>
      <div id="body-backup" style="display:none;padding-top:10px">
        <div style="font-size:12px;color:#7A7870;margin-bottom:10px;line-height:1.5">
          1. Go to <a href="https://github.com/settings/tokens/new" target="_blank" style="color:#1D9E75">github.com/settings/tokens/new</a><br>
          2. Name it "Habit Tracker", check <strong>gist</strong> scope, click Generate<br>
          3. Paste the token below
        </div>
        <input id="gist-token-input" type="password" placeholder="ghp_xxxxxxxxxxxx"
          style="width:100%;padding:8px 10px;border:1px solid #E4E2DB;border-radius:8px;font-size:13px;margin-bottom:10px;outline:none"
          value="${getGistToken()}" />
        <div style="display:flex;gap:8px;margin-bottom:12px">
          <button id="save-token-btn" style="flex:1;padding:8px;background:#1D9E75;color:#fff;border:none;border-radius:8px;font-size:13px;cursor:pointer">Save & Test</button>
          <button id="backup-now-btn" style="flex:1;padding:8px;background:#F7F6F3;border:1px solid #E4E2DB;border-radius:8px;font-size:13px;cursor:pointer">Backup now</button>
        </div>
      </div>
    </div>

    <div id="section-restore">
      <div style="${hdr}" id="toggle-restore">
        <span style="${lbl}">Restore</span>
        <span style="${chv}" id="chevron-restore">▶</span>
      </div>
      <div id="body-restore" style="display:none;padding-top:10px">
        <div id="restore-list" style="margin-bottom:8px"></div>
        <div id="restore-error" style="font-size:11px;color:#D85A30;margin-bottom:8px;display:none"></div>
      </div>
    </div>
  `;
  document.body.appendChild(panel);

  // Collapsible toggles
  ['habits', 'backup', 'restore'].forEach(id => {
    document.getElementById('toggle-' + id).onclick = () => {
      const body = document.getElementById('body-' + id);
      const chevron = document.getElementById('chevron-' + id);
      const open = body.style.display !== 'none';
      body.style.display = open ? 'none' : 'block';
      chevron.textContent = open ? '▶' : '▼';
      if (!open && id === 'restore') loadRestoreList();
    };
  });

  renderHabitsManageList();

  document.getElementById('add-habit-btn').onclick = () => {
    const input = document.getElementById('new-habit-input');
    const name = input.value.trim();
    if (!name) return;
    const h = loadHabits();
    if (h.find(x => x.name === name)) return;
    h.push({ name, startDate: getDateKey(new Date()), status: 'active', pausedFrom: null });
    save(h, loadCompletions());
    input.value = '';
    renderHabitsManageList();
    render();
  };

  document.getElementById('close-settings-btn').onclick = () => panel.remove();
  document.getElementById('backup-now-btn').onclick = () => { panel.remove(); runGistBackup(getDateKey(new Date()), 'daily'); };
  document.getElementById('save-token-btn').onclick = () => {
    const token = document.getElementById('gist-token-input').value.trim();
    if (!token) return;
    localStorage.setItem('gist_token', token);
    panel.remove();
    runGistBackup(getDateKey(new Date()), 'daily');
  };
}

function renderHabitsManageList() {
  const listEl = document.getElementById('habits-manage-list');
  if (!listEl) return;
  const habits = loadHabits();
  listEl.innerHTML = '';

  const active   = habits.filter(h => h.status === 'active');
  const paused   = habits.filter(h => h.status === 'paused');
  const archived = habits.filter(h => h.status === 'archived');

  const btnStyle = 'padding:3px 8px;background:#F7F6F3;border:1px solid #E4E2DB;border-radius:6px;font-size:11px;cursor:pointer;color:#7A7870';
  const redBtnStyle = 'padding:3px 8px;background:#F7F6F3;border:1px solid #E4E2DB;border-radius:6px;font-size:11px;cursor:pointer;color:#D85A30';

  function makeRow(habit) {
    const row = document.createElement('div');
    row.style.cssText = 'display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid #F0EFE9;';
    const name = document.createElement('div');
    const isArchived = habit.status === 'archived';
    const isPaused = habit.status === 'paused';
    name.style.cssText = 'font-size:13px;color:' + (isArchived ? '#D4D2CC' : isPaused ? '#B4B2A9' : '#1A1917');
    name.textContent = habit.name;
    const btns = document.createElement('div');
    btns.style.cssText = 'display:flex;gap:6px;flex-shrink:0';

    if (isArchived) {
      // Unarchive — backfills 'na' for the archived period, same as unpause
      const unarchiveBtn = document.createElement('button');
      unarchiveBtn.textContent = 'Restore';
      unarchiveBtn.style.cssText = btnStyle;
      unarchiveBtn.onclick = () => {
        const h = loadHabits();
        const c = loadCompletions();
        const result = unpauseHabit(h, c, habit.name, getDateKey(new Date()));
        // unpauseHabit sets status to 'active', which is what we want
        save(result.habits, result.completions);
        renderHabitsManageList();
        render();
      };
      btns.appendChild(unarchiveBtn);
    } else if (isPaused) {
      // Resume button
      const resumeBtn = document.createElement('button');
      resumeBtn.textContent = 'Resume';
      resumeBtn.style.cssText = btnStyle;
      resumeBtn.onclick = () => {
        const h = loadHabits();
        const c = loadCompletions();
        const result = unpauseHabit(h, c, habit.name, getDateKey(new Date()));
        save(result.habits, result.completions);
        renderHabitsManageList();
        render();
      };
      btns.appendChild(resumeBtn);
    } else {
      // Pause button
      const pauseBtn = document.createElement('button');
      pauseBtn.textContent = '⏸';
      pauseBtn.style.cssText = btnStyle;
      pauseBtn.onclick = () => {
        const h = loadHabits();
        const c = loadCompletions();
        save(pauseHabit(h, habit.name, getDateKey(new Date())), c);
        renderHabitsManageList();
        render();
      };
      btns.appendChild(pauseBtn);
    }

    if (!isArchived) {
      // Archive button (replaces delete)
      const archiveBtn = document.createElement('button');
      archiveBtn.textContent = '✕';
      archiveBtn.style.cssText = redBtnStyle;
      archiveBtn.onclick = () => {
        if (archiveBtn.dataset.confirm === 'true') {
          const h = loadHabits().map(x => x.name === habit.name ? { ...x, status: 'archived', pausedFrom: x.pausedFrom || getDateKey(new Date()) } : x);
          save(h, loadCompletions());
          renderHabitsManageList();
          render();
        } else {
          archiveBtn.textContent = 'Sure?';
          archiveBtn.dataset.confirm = 'true';
          setTimeout(() => { archiveBtn.textContent = '✕'; archiveBtn.dataset.confirm = ''; }, 3000);
        }
      };
      btns.appendChild(archiveBtn);
    }

    row.appendChild(name);
    row.appendChild(btns);
    return row;
  }

  function makeGroupLabel(text) {
    const el = document.createElement('div');
    el.style.cssText = 'font-size:10px;font-weight:500;letter-spacing:0.06em;text-transform:uppercase;color:#D4D2CC;padding:10px 0 4px';
    el.textContent = text;
    return el;
  }

  active.forEach(h => listEl.appendChild(makeRow(h)));

  if (paused.length > 0) {
    listEl.appendChild(makeGroupLabel('Paused'));
    paused.forEach(h => listEl.appendChild(makeRow(h)));
  }

  if (archived.length > 0) {
    listEl.appendChild(makeGroupLabel('Archived'));
    archived.forEach(h => listEl.appendChild(makeRow(h)));
  }
}

async function loadRestoreList() {
  const listEl = document.getElementById('restore-list');
  const errEl = document.getElementById('restore-error');
  if (!listEl) return;

  const token = getGistToken();
  if (!token) {
    listEl.innerHTML = '<div style="font-size:12px;color:#B4B2A9">Add a token above to enable restore.</div>';
    return;
  }

  // Build list of known gists: daily + weekly 1-4
  const slots = [
    { label: 'Daily', idKey: 'daily' },
    { label: 'Weekly 1', idKey: 'weekly1' },
    { label: 'Weekly 2', idKey: 'weekly2' },
    { label: 'Weekly 3', idKey: 'weekly3' },
    { label: 'Weekly 4', idKey: 'weekly4' },
  ];

  const available = slots.filter(s => getGistId(s.idKey));
  if (available.length === 0) {
    listEl.innerHTML = '<div style="font-size:12px;color:#B4B2A9">No backups found yet.</div>';
    return;
  }

  listEl.innerHTML = '<div style="font-size:12px;color:#B4B2A9;margin-bottom:8px">Loading backups...</div>';

  // Fetch date from each gist
  const rows = await Promise.all(available.map(async slot => {
    try {
      const res = await fetch('https://api.github.com/gists/' + getGistId(slot.idKey), {
        headers: { Authorization: 'token ' + token }
      });
      if (!res.ok) return { ...slot, date: null, error: 'HTTP ' + res.status };
      const data = await res.json();
      const file = Object.values(data.files)[0];
      const content = JSON.parse(file.content);
      return { ...slot, date: content.date, content };
    } catch(e) {
      return { ...slot, date: null, error: e.message };
    }
  }));

  listEl.innerHTML = '';
  rows.forEach(row => {
    const item = document.createElement('div');
    item.style.cssText = 'display:flex;justify-content:space-between;align-items:center;padding:8px 10px;border:1px solid #E4E2DB;border-radius:8px;margin-bottom:6px;';
    const label = document.createElement('div');
    label.style.cssText = 'font-size:13px;color:#1A1917;';
    label.textContent = row.label + (row.date ? ' — ' + row.date : row.error ? ' — error' : '');
    item.appendChild(label);
    if (row.content) {
      const btn = document.createElement('button');
      btn.textContent = 'Restore';
      btn.style.cssText = 'padding:4px 10px;background:#D85A30;color:#fff;border:none;border-radius:6px;font-size:12px;cursor:pointer;flex-shrink:0';
      btn.onclick = () => {
        if (btn.dataset.confirm === 'true') {
          confirmRestore(row);
        } else {
          btn.textContent = 'Sure?';
          btn.dataset.confirm = 'true';
          setTimeout(() => { btn.textContent = 'Restore'; btn.dataset.confirm = ''; }, 3000);
        }
      };
      item.appendChild(btn);
    }
    listEl.appendChild(item);
  });
}

function confirmRestore(row) {
  const panel = document.getElementById('settings-panel');
  const errEl = document.getElementById('restore-error');
  try {
    localStorage.setItem('habits', JSON.stringify(row.content.habits));
    localStorage.setItem('completions', JSON.stringify(row.content.completions));
    panel.remove();
    render();
    showBackupStatus('✓', 'ok');
  } catch(e) {
    errEl.textContent = '✗ ' + e.message;
    errEl.style.display = 'block';
  }
}

function renderSettingsButton() {
  const btn = document.createElement('button');
  btn.textContent = '⚙';
  btn.title = 'Backup settings';
  btn.style.cssText = 'background:none;border:none;font-size:15px;cursor:pointer;color:#B4B2A9;line-height:1;padding:0;text-align:left';
  btn.onclick = renderSettings;
  // Place it as the first cell in the grid (the empty name-column header slot)
  const grid = document.getElementById('main-grid');
  grid.insertBefore(btn, grid.firstChild);
}

render();
runBackupIfDue();
</script>
</body>
</html>
